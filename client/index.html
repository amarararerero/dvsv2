<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiSK | President Voting System</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
  </head>
  <body>
    <div id="app">
      <style>
        body {
          margin: 0;
          padding: 0;
          background-color: #0f172a;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
          font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .loader-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1.5rem;
        }
        .pulse-logo {
          position: relative;
          width: 80px;
          height: 80px;
          display: flex;
          justify-content: center;
          align-items: center;
          background: radial-gradient(circle, #10b981 0%, #047857 100%);
          color: #ffffff;
          border-radius: 50%;
          box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
          animation: pulse-glow 2s infinite ease-in-out;
        }
        .pulse-logo svg {
          fill: currentColor;
          width: 44px;
          height: 44px;
        }
        .loading-bar {
          width: 150px;
          height: 4px;
          background: rgba(255, 255, 255, 0.1);
          border-radius: 2px;
          overflow: hidden;
          position: relative;
        }
        .loading-bar::after {
          content: '';
          display: block;
          width: 60px;
          height: 100%;
          background: #10b981;
          border-radius: 2px;
          position: absolute;
          left: -60px;
          animation: slide-bar 1.5s infinite linear;
        }
        .loading-text {
          color: #94a3b8;
          font-size: 0.875rem;
          font-weight: 500;
          letter-spacing: 0.15em;
          text-transform: uppercase;
          animation: pulse-text 1.5s infinite ease-in-out;
        }
        @keyframes pulse-glow {
          0%, 100% {
            transform: scale(0.95);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
          }
          50% {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(16, 185, 129, 0.7);
          }
        }
        @keyframes slide-bar {
          0% { left: -60px; }
          100% { left: 150px; }
        }
        @keyframes pulse-text {
          0%, 100% { opacity: 0.5; }
          50% { opacity: 1; }
        }
      </style>
      <div class="loader-container">
        <div class="pulse-logo">
          <!-- Checkmark / Voting Box Symbol -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
        </div>
        <div class="loading-bar"></div>
        <div class="loading-text">Loading DiSK System</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
